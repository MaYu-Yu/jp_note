<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字卡學習</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .flashcard-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 5vh;
        }

        .flashcard {
            width: 95%;
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 0.5rem;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        .card-header-main {
            padding: 1.5rem 2rem;
            background-color: #d6eaff;
            border-bottom: 2px solid #007bff;
            border-radius: 0.5rem 0.5rem 0 0;
            font-size: 1.2rem;
            color: #007bff;
            font-weight: bold;
            cursor: pointer;
        }

        .card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            text-align: center;
        }

        .term-text {
            font-size: 3rem;
            font-weight: bold;
            color: #007bff;
            margin: 0;
            line-height: 1.3;
            word-break: break-word;
            text-align: left;
        }

        .term-line {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 1.5rem;
            cursor: pointer;
            min-height: 100px;
        }

        .explanation-line,
        .example-line {
            text-align: left;
        }

        .pos-badge,
        .tts-button {
            margin-left: 10px;
        }

        .pos-badge {
            font-size: 1.2rem;
        }

        .tts-button {
            cursor: pointer;
            color: #28a745;
            font-size: 1.5em;
            vertical-align: top;
            transition: color 0.2s;
        }

        .tts-button:hover {
            color: #1e7e34;
        }

        .explanation-line {
            margin-bottom: 1.5rem;
        }

        .content-label {
            font-weight: bold;
            color: #6c757d;
            margin-bottom: 0.25rem;
            font-size: 1.1rem;
            text-align: left;
        }

        .content-text {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            line-height: 1.6;
            text-align: left;
        }

        .explanation-style {
            color: #343a40;
            padding: 10px;
            background-color: #e9f5ff;
            border-left: 4px solid #007bff;
            border-radius: 4px;
        }

        .example-style {
            color: #343a40;
            padding: 10px;
            background-color: #f7f7f7;
            border-left: 4px solid #28a745;
            border-radius: 4px;
            cursor: pointer;
        }

        .control-row-nav-internal {
            display: flex;
            width: 100%;
            justify-content: space-between;
            gap: 15px;
            padding-top: 1rem;
            border-top: 1px solid #ddd;
            margin-top: auto;
        }

        .control-row-nav-internal .btn-lg {
            flex-grow: 1;
            max-width: 48%;
        }

        .control-row-main {
            width: 95%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .control-row-center {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .autoplay-controls .form-select {
            width: 100px;
        }
    </style>
</head>

<body>
    <div class="container flashcard-container">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="card flashcard shadow">
                    <div class="card-header card-header-main" id="flashcard-header" data-bs-toggle="collapse"
                        data-bs-target="#explanation-content" aria-expanded="false" aria-controls="explanation-content">
                        單字卡牌組：{{ filter_summary }}
                    </div>

                    <div class="card-body">
                        <div>
                            <div class="text-center mb-4">
                                <span id="current-index-display" class="h5 text-dark fw-bold me-3">載入中...</span>
                            </div>

                            <div class="term-line" id="term-line-clickable" data-bs-toggle="collapse"
                                data-bs-target="#explanation-content" aria-expanded="false"
                                aria-controls="explanation-content">
                                <h2 class="term-text" id="card-term"></h2>
                                <span id="card-pos" class="pos-badge badge bg-primary"></span>
                                <span class="tts-button" id="term-tts-btn">🔊</span>
                                <span id="card-type-info" class="ms-auto text-secondary small"></span>
                            </div>

                            <div class="collapse" id="explanation-content">
                                <div class="explanation-line">
                                    <p class="content-label">解釋/中文意思:</p>
                                    <p class="content-text explanation-style" id="card-explanation"></p>
                                </div>

                                <div class="example-line">
                                    <p class="content-label">例句 (點擊可翻譯):
                                        <span class="tts-button" id="example-tts-btn">🔊</span>
                                    </p>
                                    <p class="content-text example-style" id="card-example"
                                        onclick="openGoogleTranslate(currentCardData.example_sentence)">
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="control-row-nav-internal">
                            <button id="prev-btn" class="btn btn-warning btn-lg" onclick="navigateCard(-1)">←
                                上一張</button>
                            <button id="next-btn" class="btn btn-success btn-lg" onclick="handleNextClick()">下一張/看答案
                                →</button>
                        </div>
                    </div>
                </div>
                <div class="control-row-main mt-4">
                    <div class="control-row-center">
                        <button onclick="history.back()" class="btn btn-secondary">← 返回上頁</button>
                        <a href="{{ url_for('home') }}" class="btn btn-secondary">🏠 返回首頁</a>
                        <div class="autoplay-controls d-flex flex-nowrap align-items-center">
                            <select id="interval-select" class="form-select w-auto me-2">
                                <option value="1000" selected>1 秒</option>
                                <option value="2000">2 秒</option>
                                <option value="3000">3 秒</option>
                                <option value="4000">4 秒</option>
                                <option value="5000">5 秒</option>
                                <option value="6000">6 秒</option>
                                <option value="7000">7 秒</option>
                                <option value="8000">8 秒</option>
                                <option value="9000">9 秒</option>
                                <option value="10000">10 秒</option>
                            </select>
                            <button id="play-pause-btn" class="btn btn-primary" onclick="toggleAutoPlay()">▶️
                                自動播放</button>
                        </div>
                        <button id="replay-btn" class="btn btn-info" onclick="speakFullAnswerWithCancel()">🔊
                            重唸答案</button>
                    </div>
                    <div class="control-row-center mt-3">
                        <label for="jump-to-input" class="form-label mb-0 fw-bold">跳轉至筆數:</label>
                        <input type="number" id="jump-to-input" class="form-control"
                            style="width: 100px; text-align: center;" min="1" max="{{ total_count }}"
                            value="{{ current_index + 1 }}" aria-label="跳轉筆數">
                        <button class="btn btn-primary" onclick="jumpToCard()">GO</button>
                        <small class="text-muted">(1 - {{ total_count }})</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const BATCH_SIZE = 20;
        let current_index = {{ current_index }};
        const total_count = {{ total_count }};
        let currentCardData = null;
        let cardCache = [];
        let currentBatchStart = 0;

        // --- 核心修復變數 ---
        let currentSpeakId = 0; // 唯一序列鎖，防止語音重疊
        let autoPlayTimeout = null;
        const SESSION_KEY = 'flashcard_autoplay_enabled';
        const INTERVAL_KEY = 'flashcard_autoplay_interval';

        const indexDisplay = document.getElementById('current-index-display');
        const termElement = document.getElementById('card-term');
        const posElement = document.getElementById('card-pos');
        const explanationElement = document.getElementById('card-explanation');
        const exampleElement = document.getElementById('card-example');
        const contentCollapse = document.getElementById('explanation-content');
        const typeInfoElement = document.getElementById('card-type-info');
        const nextButton = document.getElementById('next-btn');
        const jumpInput = document.getElementById('jump-to-input');
        const intervalSelect = document.getElementById('interval-select');
        const playPauseBtn = document.getElementById('play-pause-btn');

        function filterParentheses(text) {
            if (!text) return '';
            return text.replace(/\((.*?)\)|（(.*?)）/g, '').trim();
        }

        function stopAutoPlayLoop(updateButton = true) {
            resetSequence();
            sessionStorage.removeItem(SESSION_KEY); // 清除狀態
            if (intervalSelect) intervalSelect.disabled = false;
            if (updateButton && playPauseBtn) {
                playPauseBtn.innerHTML = '▶️ 自動播放';
                playPauseBtn.classList.remove('btn-danger');
                playPauseBtn.classList.add('btn-primary'); // 回歸藍色
            }
        }

        function getGoogleVoice(lang) {
            const voices = window.speechSynthesis.getVoices();
            if (lang === 'ja-JP') {
                // 優先尋找 Google 日本語，若找不到則退而求其次找任何日文語音
                return voices.find(v => v.name === 'Google 日本語') || voices.find(v => v.lang === 'ja-JP');
            } else {
                // 優先尋找 Google 國語（臺灣），若找不到則退而求其次找任何台灣中文語音
                return voices.find(v => v.name === 'Google 國語（臺灣）') || voices.find(v => v.lang.includes('zh-TW'));
            }
        }

        function speakText(text, lang, callback = () => { }) {
            if (!('speechSynthesis' in window) || !text || text.trim() === '') {
                callback(); return;
            }

            const thisId = currentSpeakId; // 記錄發起時的 ID
            let textToSpeak = filterParentheses(text.trim());

            if (lang === 'ja-JP') {
                const match = textToSpeak.match(/\[([^\]]+)\]/);
                textToSpeak = (match && match[1]) ? match[1].trim() : textToSpeak.split('+')[0].trim();
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);

            // 設定語言
            utterance.lang = (lang === 'zh-TW') ? 'zh-TW' : 'ja-JP';

            // --- 核心修改：設定指定的 Google 語音 ---
            const selectedVoice = getGoogleVoice(utterance.lang);
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }

            utterance.onend = () => { if (thisId === currentSpeakId) callback(); };
            utterance.onerror = () => { if (thisId === currentSpeakId) callback(); };
            window.speechSynthesis.speak(utterance);
        }

        function speakFullAnswer(callback = () => { }) {
            if (!currentCardData || currentCardData.type === 'error') { callback(); return; }
            const thisId = currentSpeakId;

            speakText(currentCardData.term, 'ja-JP', () => {
                if (thisId !== currentSpeakId) return;
                speakText(currentCardData.explanation || "", 'zh-TW', () => {
                    if (thisId !== currentSpeakId) return;
                    speakText(currentCardData.example_sentence || "", 'ja-JP', () => {
                        if (thisId !== currentSpeakId) return;
                        // 例句唸第二次
                        speakText(currentCardData.example_sentence || "", 'ja-JP', () => {
                            if (thisId === currentSpeakId) callback();
                        });
                    });
                });
            });
        }

        // 重唸答案按鈕
        function speakFullAnswerWithCancel() {
            resetSequence(); // 重唸答案不會關閉自動播放，只會重新開始這筆的語音鏈
            if (!contentCollapse.classList.contains('show')) new bootstrap.Collapse(contentCollapse, { toggle: true });
            nextButton.textContent = '下一張 →';
            setTimeout(() => {
                speakFullAnswer(() => {
                    if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                        // 唸完後如果是自動播放，過一個間隔後跳下一張
                        const interval = parseInt(sessionStorage.getItem(INTERVAL_KEY)) || 3000;
                        autoPlayTimeout = setTimeout(() => navigateCard(1), interval);
                    }
                });
            }, 300);
        }

        function openGoogleTranslate(text) {
            stopAutoPlayLoop(true);
            window.open(`https://translate.google.com/?sl=ja&tl=zh-TW&text=${encodeURIComponent(text)}&op=translate`, '_blank');
            return false;
        }

        async function fetchAndCacheBatch(startIndex) {
            if (startIndex >= total_count) return;
            try {
                const response = await fetch(`/api/get_flashcard/${startIndex}`);
                const result = await response.json();
                if (result.success) { cardCache = result.cards; currentBatchStart = startIndex; }
            } catch (error) { console.error('Fetch error:', error); }
        }

        function renderCard(card, autoSpeakTermOnly = false) {
            currentCardData = card;
            indexDisplay.textContent = `第 ${current_index + 1} / ${total_count} 筆`;
            jumpInput.value = current_index + 1;
            termElement.innerHTML = card.term ? card.term.replace(/\|/g, '<br>') : 'N/A';
            posElement.textContent = card.part_of_speech || '';
            posElement.style.display = card.part_of_speech ? 'inline-block' : 'none';
            explanationElement.innerHTML = card.explanation ? card.explanation.replace(/\n/g, '<br>') : 'N/A';
            exampleElement.innerHTML = card.example_sentence ? card.example_sentence.replace(/\n/g, '<br>') : 'N/A';
            typeInfoElement.textContent = card.type === 'vocab' ? '單字' : (card.type === 'grammar' ? '文法' : '');
            contentCollapse.classList.remove('show');
            nextButton.textContent = '下一張/看答案 →';

            if (autoSpeakTermOnly) {
                if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                    speakText(card.term, 'ja-JP', () => autoPlayWaitAndShowAnswer());
                } else {
                    speakText(card.term, 'ja-JP');
                }
            }
        }

        async function navigateToNewIndex(newIndex) {
            const cacheIndex = newIndex - currentBatchStart;
            if (cacheIndex < 0 || cacheIndex >= cardCache.length) {
                await fetchAndCacheBatch(Math.floor(newIndex / BATCH_SIZE) * BATCH_SIZE);
            }
            current_index = newIndex;
            const card = cardCache[current_index - currentBatchStart];
            if (card) renderCard(card, true);

            await fetch('{{ url_for("update_flashcard_index") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index: current_index })
            });
        }

        // 這個函式用來「打斷當前的語音與計時」，但「保留自動播放狀態」
        function resetSequence() {
            currentSpeakId++; // 提升 ID，讓舊的 callback 失效
            if (autoPlayTimeout) {
                clearTimeout(autoPlayTimeout);
                autoPlayTimeout = null;
            }
            // 停止目前所有正在發音的語音
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        async function navigateCard(step) {
            // 如果原本在自動播放，resetSequence 會處理語音，但保留 SESSION_KEY 使其續播
            resetSequence();
            await navigateToNewIndex((current_index + step + total_count) % total_count);
        }

        async function handleNextClick() {
            if (!currentCardData) return;

            const thisId = ++currentSpeakId; // 手動點擊時立刻更新 ID，阻斷之前的自動鏈條

            if (!contentCollapse.classList.contains('show')) {
                // 原本 resetSequence() 放在這裡也可以，但要確保 logic 順序
                if (autoPlayTimeout) clearTimeout(autoPlayTimeout);
                window.speechSynthesis.cancel();

                new bootstrap.Collapse(contentCollapse, { toggle: true });
                nextButton.textContent = '下一張 →';

                // 延遲一點點確保 Collapse 動畫不會影響語音
                setTimeout(() => {
                    if (thisId !== currentSpeakId) return;
                    speakFullAnswer(() => {
                        // 如果是自動播放模式，唸完答案後重新啟動「等待下一張」的計時
                        if (sessionStorage.getItem(SESSION_KEY) === 'true' && thisId === currentSpeakId) {
                            const interval = parseInt(sessionStorage.getItem(INTERVAL_KEY)) || 3000;
                            autoPlayTimeout = setTimeout(() => navigateCard(1), interval);
                        }
                    });
                }, 300);
            } else {
                await navigateCard(1);
            }
        }

        async function jumpToCard() {
            const target = parseInt(jumpInput.value);
            if (!isNaN(target) && target >= 1 && target <= total_count) {
                resetSequence();
                await navigateToNewIndex(target - 1);
            }
        }

        function autoPlayWaitAndShowAnswer() {
            // 如果中途停止了自動播放，直接退出
            if (sessionStorage.getItem(SESSION_KEY) !== 'true') return;

            const interval = parseInt(sessionStorage.getItem(INTERVAL_KEY)) || 3000;
            const thisId = currentSpeakId; // 閉包鎖定當前 ID

            autoPlayTimeout = setTimeout(() => {
                // 檢查：如果 ID 已變更（表示手動按了下一張），則不執行舊的翻面動作
                if (thisId !== currentSpeakId) return;

                // 翻開答案面
                if (!contentCollapse.classList.contains('show')) {
                    new bootstrap.Collapse(contentCollapse, { toggle: true });
                }

                // 唸完內容後，再次檢查 ID 才進入下一張
                speakFullAnswer(() => {
                    if (thisId !== currentSpeakId || sessionStorage.getItem(SESSION_KEY) !== 'true') return;

                    autoPlayTimeout = setTimeout(async () => {
                        if (thisId === currentSpeakId) {
                            await navigateToNewIndex((current_index + 1) % total_count);
                        }
                    }, interval);
                });
            }, interval);
        }

        function toggleAutoPlay() {
            if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                stopAutoPlayLoop(true);
            } else {
                resetSequence();
                sessionStorage.setItem(INTERVAL_KEY, intervalSelect.value);
                sessionStorage.setItem(SESSION_KEY, 'true');

                // 變更為暫停狀態（紅色）
                playPauseBtn.innerHTML = '⏸️ 暫停播放';
                playPauseBtn.classList.remove('btn-primary');
                playPauseBtn.classList.add('btn-danger');

                intervalSelect.disabled = true;

                if (!contentCollapse.classList.contains('show')) {
                    speakText(currentCardData.term, 'ja-JP', () => autoPlayWaitAndShowAnswer());
                } else {
                    autoPlayWaitAndShowAnswer();
                }
            }
        }

        document.getElementById('term-line-clickable').addEventListener('click', (e) => {
            if (e.target.classList.contains('tts-button')) return;
            stopAutoPlayLoop(true);
            if (!contentCollapse.classList.contains('show')) {
                nextButton.textContent = '下一張 →';
                setTimeout(() => speakFullAnswer(), 300);
            } else { nextButton.textContent = '下一張/看答案 →'; }
        });

        document.getElementById('flashcard-header').addEventListener('click', () => {
            stopAutoPlayLoop(true);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            // --- 狀態重置：確保每次重開網頁或重新整理時，都回歸預設手動模式 ---
            sessionStorage.removeItem(SESSION_KEY); // 移除自動播放狀態
            window.speechSynthesis.cancel(); // 停止任何殘留語音
            window.speechSynthesis.getVoices();
            // 確保按鈕視覺回歸預設（藍色，顯示自動播放）
            if (playPauseBtn) {
                playPauseBtn.innerHTML = '▶️ 自動播放';
                playPauseBtn.classList.remove('btn-danger');
                playPauseBtn.classList.add('btn-primary');
            }
            if (intervalSelect) {
                intervalSelect.disabled = false;
            }

            // --- 初始資料載入 ---
            const startBatch = Math.floor(current_index / BATCH_SIZE) * BATCH_SIZE;
            await fetchAndCacheBatch(startBatch);

            const initialCard = cardCache[current_index - currentBatchStart];
            if (initialCard) {
                // 載入第一筆，並根據先前設定自動唸出單字（不觸發續播鏈）
                renderCard(initialCard, true);
            }

            // --- 事件監聽器掛載 ---

            // 單字行點擊：處理翻面或下一張
            document.getElementById('term-line-clickable').addEventListener('click', (e) => {
                // 如果點擊的是語音按鈕，不觸發翻面
                if (e.target.classList.contains('tts-button')) return;
                handleNextClick();
            });

            // 單字語音按鈕
            document.getElementById('term-tts-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                resetSequence(); // 打斷當前動作
                speakText(currentCardData.term, 'ja-JP');
            });

            // 例句語音按鈕
            document.getElementById('example-tts-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                resetSequence(); // 打斷當前動作
                speakText(currentCardData.example_sentence, 'ja-JP');
            });

            // 監聽解釋展開狀態，同步更新「下一張」按鈕文字
            contentCollapse.addEventListener('shown.bs.collapse', () => {
                nextButton.textContent = '下一張 →';
            });
            contentCollapse.addEventListener('hidden.bs.collapse', () => {
                nextButton.textContent = '下一張/看答案 →';
            });
        });
    </script>
</body>

</html>
